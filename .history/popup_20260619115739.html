<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 380px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h3 {
      margin: 0 0 15px 0;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .site-info {
      background: #f0f7ff;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .site-info label {
      font-weight: 600;
      color: #555;
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .site-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 4px 0 2px 0;
    }
    .site-url {
      word-break: break-all;
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      font-family: monospace;
    }
    .file-info {
      background: #f8f9fa;
      padding: 8px 12px;
      border-radius: 6px;
      margin: 8px 0;
      font-size: 12px;
      border-left: 3px solid #0060df;
    }
    .file-info .status {
      color: #28a745;
    }
    .file-info .status.missing {
      color: #dc3545;
    }
    .css-preview {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      padding: 12px;
      margin: 10px 0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .css-preview .empty {
      color: #858585;
      font-style: italic;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      background: #0060df;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      transition: all 0.2s;
    }
    button:hover {
      background: #0050c0;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,96,223,0.3);
    }
    button:active {
      transform: translateY(0);
    }
    button.secondary {
      background: #6c757d;
    }
    button.secondary:hover {
      background: #5a6268;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .status-message {
      margin-top: 10px;
      font-size: 12px;
      color: #28a745;
      text-align: center;
      min-height: 20px;
    }
    .badge {
      display: inline-block;
      background: #28a745;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>
      🎨 CSS Injector
      <span class="badge" id="file-badge">FILE</span>
    </h3>
    
    <div class="site-info">
      <label>Current Site</label>
      <div class="site-name" id="site-name">Loading...</div>
      <div class="site-url" id="site-url">Loading...</div>
    </div>
    
    <div class="file-info">
      <span>📄 CSS File: </span>
      <span id="css-filename">styles/default.css</span>
      <span id="file-status" class="status">✓ Loaded</span>
    </div>
    
    <div>
      <label style="font-size:12px;color:#666;font-weight:600;">CSS Content:</label>
      <div class="css-preview" id="css-preview">Loading...</div>
    </div>
    
    <div class="button-group">
      <button id="reload-btn">🔄 Reload CSS</button>
      <button id="open-folder-btn" class="secondary">📂 Open Folder</button>
    </div>
    
    <div class="status-message" id="status">Ready</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
